<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DZ Protection Notifier</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        h1 {
            color: #333;
        }
        .status {
            background-color: #e0e0e0;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 5px;
        }
        .logs {
            background-color: #fff;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            max-height: 200px;
            overflow-y: auto;
        }
        .settings {
            margin-top: 20px;
        }
        .settings label {
            display: block;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <h1>DZ Protection Notifier</h1>
    <div class="status">
        <strong>Status:</strong> <span id="status">Running</span>
    </div>
    <div class="messages">
        <strong>Messages:</strong>
        <div id="messages"></div>
    </div>
    <div class="logs">
        <strong>Logs:</strong>
        <div id="logContent"></div>
    </div>
    <div class="settings">
        <h2>Settings</h2>
        <label for="setting1">Setting 1:</label>
        <input type="text" id="setting1" placeholder="Enter value" />
        <label for="setting2">Setting 2:</label>
        <input type="text" id="setting2" placeholder="Enter value" />
    </div>
    <script>
        // JavaScript functionality for handling logs and messages will go here.
        function addLog(message) {
            const logContent = document.getElementById('logContent');
            logContent.innerHTML += `<div>${(new Date()).toISOString()}: ${message}</div>`;
            logContent.scrollTop = logContent.scrollHeight;
        }

        addLog('Popup opened.');
    </script>
</body>
</html>
